<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: monospace;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }

    input {
      width: 340px;
      height: 65px;
      font-size: 22px;
      text-align: center;
      background: transparent;
      border: 2px solid #ff0000;
      color: #ff4d4d;
      outline: none;
      border-radius: 10px;

      box-shadow:
        0 0 12px #ff0000,
        0 0 25px #ff0000 inset;

      transition: 0.2s ease;
    }

    input:focus {
      box-shadow:
        0 0 25px #ff0000,
        0 0 50px #ff0000 inset;
    }

    button {
      width: 220px;
      height: 65px;
      font-size: 20px;
      background: transparent;
      border: 2px solid #ff0000;
      color: #ff4d4d;
      border-radius: 10px;
      cursor: pointer;

      box-shadow:
        0 0 12px #ff0000,
        0 0 25px #ff0000 inset;

      transition: 0.2s ease;
    }

    button:hover {
      background: #ff0000;
      color: black;
      box-shadow:
        0 0 30px #ff0000,
        0 0 60px #ff0000;
    }
  </style>

</head>

<body>
  <div class="container">
    <input type="password" id="pass" autocomplete="off">
    <button onclick="enter()">ENTER</button>
  </div>

  <script>
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbzwwWllAvX90DuTbwlRA268Pwt88svT21K4UYvLSFGzGx56iqgX6Jgeqbv4TVBrf3LC/exec";

    function logVisit(status) {
      return fetch(ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ status: status })
      }).catch(() => {});
    }

    function enter() {
      const input = document.getElementById("pass");
      const pass = input.value;

      if (pass === "1401") {
        logVisit("success");

        const token = btoa(pass + Date.now());

        setTimeout(() => {
          window.location.href = "https://your-app.vercel.app?token=" + token;
        }, 300);

      } else {
        logVisit("fail");
        input.value = "";
      }
    }

    document.getElementById("pass").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        enter();
      }
    });
  </script>

</body>
</html>
